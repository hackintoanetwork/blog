<?xml version="1.0" encoding="UTF-8"?>
<svg width="820" height="1180" viewBox="0 0 820 1180" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#5dade2"/></marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#666666"/></marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/></marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="1180" fill="#ffffff"/>

  <!-- Title -->
  <text x="410" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">Starlink DNS Rebinding Attack Flow</text>

  <!-- ===== Actors ===== -->
  <!-- Starlink -->
  <rect x="20" y="55" width="40" height="30" rx="4" fill="#f5f5f5" stroke="#666666" stroke-width="1.5"/>
  <circle cx="40" cy="63" r="3" fill="#666666"/>
  <line x1="28" y1="78" x2="52" y2="78" stroke="#666666" stroke-width="1"/>
  <text x="40" y="105" text-anchor="middle" font-size="10" fill="#333333">Starlink</text>
  <text x="40" y="118" text-anchor="middle" font-size="9" fill="#999999">192.168.1.1</text>

  <!-- Victim's Browser -->
  <rect x="205" y="55" width="50" height="32" rx="3" fill="#f5f5f5" stroke="#666666" stroke-width="1"/>
  <rect x="212" y="59" width="36" height="20" rx="1.5" fill="#e8e8e8"/>
  <path d="M200 87 L260 87 L256 91 L204 91 Z" fill="#cccccc"/>
  <text x="230" y="105" text-anchor="middle" font-size="10" fill="#333333">Victim's</text>
  <text x="230" y="118" text-anchor="middle" font-size="10" fill="#333333">Browser</text>

  <!-- Malicious Server -->
  <rect x="425" y="55" width="50" height="32" rx="3" fill="#f5f5f5" stroke="#e74c3c" stroke-width="1"/>
  <rect x="433" y="59" width="34" height="10" rx="1" fill="#e74c3c" opacity="0.3"/>
  <rect x="433" y="71" width="34" height="10" rx="1" fill="#e74c3c" opacity="0.3"/>
  <text x="450" y="105" text-anchor="middle" font-size="10" fill="#333333">Malicious</text>
  <text x="450" y="118" text-anchor="middle" font-size="10" fill="#333333">Server</text>
  <text x="450" y="131" text-anchor="middle" font-size="9" fill="#999999">1.2.3.4</text>

  <!-- DNS Server -->
  <circle cx="660" cy="72" r="16" fill="#f5f5f5" stroke="#666666" stroke-width="1"/>
  <text x="660" y="76" text-anchor="middle" font-size="12" fill="#666666">D</text>
  <text x="660" y="105" text-anchor="middle" font-size="10" fill="#333333">Attacker's</text>
  <text x="660" y="118" text-anchor="middle" font-size="10" fill="#333333">DNS Server</text>

  <!-- Lifelines -->
  <line x1="40" y1="140" x2="40" y2="1150" stroke="#cccccc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="230" y1="140" x2="230" y2="1150" stroke="#cccccc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="450" y1="140" x2="450" y2="1150" stroke="#cccccc" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="660" y1="140" x2="660" y2="1150" stroke="#cccccc" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ========== STEP 1 ========== -->
  <rect x="690" y="150" width="120" height="50" rx="6" fill="#f5f5f5" stroke="#e67e22" stroke-width="1.5"/>
  <text x="750" y="170" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">Step 1</text>
  <text x="750" y="185" text-anchor="middle" font-size="9" fill="#666666">Attacker sets TTL 0</text>

  <rect x="510" y="210" width="280" height="40" rx="4" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="520" y="226" font-size="10" fill="#666666" font-family="monospace">attacker.example.com. 0 IN A 1.2.3.4</text>
  <text x="520" y="240" font-size="10" fill="#999999" font-family="monospace">TTL = 0 seconds</text>

  <!-- ========== STEP 2 ========== -->
  <rect x="690" y="265" width="120" height="50" rx="6" fill="#f5f5f5" stroke="#e67e22" stroke-width="1.5"/>
  <text x="750" y="285" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">Step 2</text>
  <text x="750" y="300" text-anchor="middle" font-size="9" fill="#666666">Victim visits page</text>

  <line x1="230" y1="330" x2="650" y2="330" stroke="#5dade2" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <text x="440" y="325" text-anchor="middle" font-size="10" fill="#5dade2">DNS query: attacker.example.com ?</text>

  <line x1="650" y1="355" x2="240" y2="355" stroke="#5dade2" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="440" y="350" text-anchor="middle" font-size="10" fill="#5dade2">A 1.2.3.4 (TTL=0)</text>

  <line x1="230" y1="390" x2="440" y2="390" stroke="#666666" stroke-width="1.2" marker-end="url(#arrowGray)"/>
  <text x="335" y="385" text-anchor="middle" font-size="10" fill="#333333">GET attacker.example.com</text>

  <line x1="440" y1="415" x2="240" y2="415" stroke="#666666" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
  <text x="335" y="410" text-anchor="middle" font-size="10" fill="#333333">200 OK - malicious JavaScript</text>

  <rect x="120" y="435" width="220" height="55" rx="4" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="130" y="450" font-size="10" fill="#333333" font-family="monospace">malicious.html</text>
  <text x="130" y="465" font-size="9" fill="#999999" font-family="monospace">&lt;script&gt;</text>
  <text x="130" y="478" font-size="9" fill="#999999" font-family="monospace">  // wait for DNS cache to expire</text>
  <text x="130" y="488" font-size="9" fill="#999999" font-family="monospace">&lt;/script&gt;</text>

  <!-- ========== STEP 3 ========== -->
  <rect x="690" y="505" width="120" height="50" rx="6" fill="#f5f5f5" stroke="#e67e22" stroke-width="1.5"/>
  <text x="750" y="525" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">Step 3</text>
  <text x="750" y="540" text-anchor="middle" font-size="9" fill="#666666">DNS cache expires</text>

  <rect x="150" y="520" width="160" height="30" rx="4" fill="#f5f5f5" stroke="#e67e22" stroke-width="1"/>
  <text x="230" y="540" text-anchor="middle" font-size="10" fill="#e67e22">TTL expired, DNS re-query</text>

  <rect x="500" y="560" width="300" height="50" rx="4" fill="#f5f5f5" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="510" y="576" font-size="10" fill="#e74c3c" font-weight="bold">Attacker changes DNS record:</text>
  <text x="510" y="592" font-size="10" fill="#666666" font-family="monospace">attacker.example.com. 0 IN A 192.168.1.1</text>
  <text x="510" y="604" font-size="9" fill="#999999" font-family="monospace">// changed to Starlink internal IP</text>

  <!-- ========== STEP 4 ========== -->
  <rect x="690" y="625" width="120" height="50" rx="6" fill="#f5f5f5" stroke="#e67e22" stroke-width="1.5"/>
  <text x="750" y="645" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">Step 4</text>
  <text x="750" y="660" text-anchor="middle" font-size="9" fill="#666666">DNS re-query</text>

  <line x1="230" y1="690" x2="650" y2="690" stroke="#5dade2" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <text x="440" y="685" text-anchor="middle" font-size="10" fill="#5dade2">DNS query: attacker.example.com ?</text>

  <line x1="650" y1="715" x2="240" y2="715" stroke="#e74c3c" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <text x="440" y="710" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">A 192.168.1.1 (Starlink!)</text>

  <rect x="120" y="735" width="220" height="70" rx="4" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="130" y="750" font-size="10" fill="#333333" font-family="monospace">malicious.html (same origin)</text>
  <text x="130" y="765" font-size="9" fill="#999999" font-family="monospace">&lt;script&gt;</text>
  <text x="130" y="778" font-size="9" fill="#999999" font-family="monospace">  fetch('/SpaceX.API...Handle',</text>
  <text x="130" y="791" font-size="9" fill="#999999" font-family="monospace">    {headers: grpc-web+proto})</text>
  <text x="130" y="801" font-size="9" fill="#999999" font-family="monospace">&lt;/script&gt;</text>

  <!-- ========== STEP 5 ========== -->
  <rect x="690" y="820" width="120" height="50" rx="6" fill="#f5f5f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="750" y="840" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">Step 5</text>
  <text x="750" y="855" text-anchor="middle" font-size="9" fill="#666666">SOP Bypass!</text>

  <line x1="220" y1="880" x2="50" y2="880" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="135" y="873" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="bold">POST gRPC (Stow command)</text>
  <text x="135" y="896" text-anchor="middle" font-size="9" fill="#666666">Content-Type: grpc-web+proto</text>

  <rect x="45" y="910" width="310" height="35" rx="4" fill="#f5f5f5" stroke="#27ae60" stroke-width="1.5"/>
  <text x="200" y="925" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">Same Origin (attacker.example.com)</text>
  <text x="200" y="938" text-anchor="middle" font-size="9" fill="#27ae60">No CORS Preflight - gRPC header preserved</text>

  <line x1="50" y1="960" x2="220" y2="960" stroke="#666666" stroke-width="1.2" stroke-dasharray="6,3" marker-end="url(#arrowGray)"/>
  <text x="135" y="955" text-anchor="middle" font-size="10" fill="#333333">grpc-status: 0 (Success)</text>

  <!-- ========== STEP 6 ========== -->
  <rect x="690" y="980" width="120" height="50" rx="6" fill="#f5f5f5" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="750" y="1000" text-anchor="middle" font-size="10" font-weight="bold" fill="#e74c3c">Step 6</text>
  <text x="750" y="1015" text-anchor="middle" font-size="9" fill="#666666">Exfiltration</text>

  <rect x="120" y="1045" width="220" height="55" rx="4" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="130" y="1060" font-size="10" fill="#333333" font-family="monospace">malicious.html</text>
  <text x="130" y="1075" font-size="9" fill="#999999" font-family="monospace">&lt;script&gt;</text>
  <text x="130" y="1088" font-size="9" fill="#999999" font-family="monospace">  // send stolen data to attacker</text>
  <text x="130" y="1098" font-size="9" fill="#999999" font-family="monospace">&lt;/script&gt;</text>

  <line x1="230" y1="1120" x2="440" y2="1120" stroke="#e74c3c" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <text x="335" y="1115" text-anchor="middle" font-size="10" fill="#e74c3c">POST /attacker (stolen data)</text>

  <rect x="400" y="1145" width="100" height="30" rx="6" fill="#f5f5f5" stroke="#999999" stroke-width="1"/>
  <text x="450" y="1165" text-anchor="middle" font-size="11" fill="#333333" font-weight="bold">Save data</text>
</svg>
